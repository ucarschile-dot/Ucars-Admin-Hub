<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ucars Hub Admin</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f8f9ff;
      --bar-bg: #282828;
      --sidebar-text: rgba(234, 241, 255, 0.76);
      --sidebar-active: #f5c34b;
      --sidebar-active-bg: rgba(245, 195, 75, 0.13);
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 10px 30px rgba(11, 28, 48, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      min-width: 1200px;
      font-family: Inter, "Segoe UI", sans-serif;
      color: #0b1c30;
      background: var(--bg);
    }

    .layout {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      min-height: 60px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      color: var(--sidebar-text);
      background: var(--bar-bg);
      border-bottom: 1px solid var(--border);
      transition: transform 220ms ease, box-shadow 220ms ease;
      transform: translateY(0);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.16);
    }

    .topbar.is-hidden {
      transform: translateY(-110%);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 182px;
      background: var(--bar-bg);
    }

    .brand-logo-wrap {
      width: 176px;
      max-width: 176px;
      height: 34px;
      overflow: hidden;
      background: var(--bar-bg);
    }

    .brand-logo {
      display: block;
      width: 100%;
      height: 180%;
      object-fit: cover;
      object-position: center 50%;
      transform: none;
      transform-origin: center;
    }

    .brand p {
      display: none;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex-wrap: nowrap;
      flex: 1;
    }

    .nav-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 24px;
      padding: 0 8px;
      color: var(--sidebar-text);
      text-decoration: none;
      border-left: 0;
      border-bottom: 2px solid transparent;
      border-radius: 6px;
      font-size: 0.8rem;
      transition: background-color 140ms ease, color 140ms ease, border-color 140ms ease;
    }

    .nav-link:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
    }

    .nav-link.is-active {
      color: var(--sidebar-active);
      background: var(--sidebar-active-bg);
      border-bottom-color: var(--sidebar-active);
    }

    .content {
      position: relative;
      min-height: 100vh;
      padding-top: 60px;
      overflow: hidden;
      background: var(--bg);
    }

    .screen {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
      transition: opacity 200ms ease, transform 200ms ease;
    }

    .screen.is-active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      z-index: 1;
    }

    .screen iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: var(--bg);
    }

  </style>
</head>
<body>
  <div class="layout">
    <header class="topbar" aria-label="Navegacion principal">
      <div class="brand">
        <div class="brand-logo-wrap">
          <img class="brand-logo" src="/stitch-export/logo-sidebar.png" alt="Ucars" />
        </div>
        <p>Panel administrativo</p>
      </div>
      <nav class="nav">
        <a class="nav-link" data-screen="stock" href="#stock">Stock</a>
        <a class="nav-link" data-screen="ucarianos" href="#ucarianos">Ucarianos</a>
        <a class="nav-link" data-screen="agenda" href="#agenda">Agenda</a>
        <a class="nav-link" data-screen="notificaciones" href="#notificaciones">Notificaciones</a>
      </nav>
    </header>

    <main class="content" aria-live="polite">
      <section class="screen" data-screen="stock">
        <iframe src="/stitch-export/stock.html" title="Stock"></iframe>
      </section>
      <section class="screen" data-screen="ucarianos">
        <iframe src="/stitch-export/ucarianos.html" title="Ucarianos"></iframe>
      </section>
      <section class="screen" data-screen="agenda">
        <iframe src="/stitch-export/agenda.html" title="Agenda"></iframe>
      </section>
      <section class="screen" data-screen="notificaciones">
        <iframe src="/stitch-export/notificaciones.html" title="Notificaciones"></iframe>
      </section>
    </main>
  </div>

  <script>
    (function () {
      var topbar = document.querySelector('.topbar');
      var iframeEntries = [];
      var validScreens = ['stock', 'ucarianos', 'agenda', 'notificaciones'];
      var defaultScreen = 'stock';
      var lastScrollY = window.scrollY || 0;
      var scrollRaf = 0;
      var activeScrollSource = window;

      function syncTopbarVisibility() {
        var currentScrollY = activeScrollSource && typeof activeScrollSource.scrollY === 'number' ? activeScrollSource.scrollY : 0;
        var shouldHide = currentScrollY > 12 && currentScrollY > lastScrollY;

        if (topbar) {
          topbar.classList.toggle('is-hidden', shouldHide);
        }

        lastScrollY = currentScrollY;
        scrollRaf = 0;
      }

      function onScroll() {
        if (scrollRaf) {
          return;
        }

        activeScrollSource = window;
        scrollRaf = window.requestAnimationFrame(syncTopbarVisibility);
      }

      function attachScrollSource(source) {
        if (!source || iframeEntries.indexOf(source) >= 0) {
          return;
        }

        iframeEntries.push(source);
        source.addEventListener('scroll', function () {
          activeScrollSource = source;
          onScroll();
        }, { passive: true });
      }

      function normalizeIframe(frame) {
        try {
          var doc = frame.contentDocument;
          if (!doc) return;

          if (doc.getElementById('ucars-embed-reset')) {
            return;
          }

          var style = doc.createElement('style');
          style.id = 'ucars-embed-reset';
          style.textContent = [
            'nav.fixed.left-0, aside.fixed.left-0, nav[class*="left-0"][class*="fixed"], aside[class*="left-0"][class*="fixed"] { display: none !important; }',
            'header.fixed.top-0 { display: none !important; }',
            'html, body { margin: 0 !important; background: #f8f9ff !important; }',
            '[class*="md:ml-[260px]"], [class*="ml-[260px]"] { margin-left: 0 !important; }',
            '[class*="md:left-[260px]"], [class*="left-[260px]"] { left: 0 !important; }',
            '[class*="md:w-[calc(100%-260px)]"], [class*="w-[calc(100%-260px)]"] { width: 100% !important; }',
            '[class*="md:pl-[260px]"], [class*="pl-[260px]"] { padding-left: 0 !important; }',
            '[class*="md:pt-16"], [class*="pt-16"] { padding-top: 0 !important; }',
            '.md\\:hidden { display: none !important; }',
            '.md\\:flex { display: flex !important; }'
          ].join(' ');
          doc.head.appendChild(style);

          localizeIframe(doc);
        } catch (_) {
          // Ignore sanitization errors and keep rendering the iframe as-is.
        }
      }

      function localizeIframe(doc) {
        var dictionary = [
          ['Dealership Admin', 'Panel administrativo'],
          ['Notifications', 'Notificaciones'],
          ['Vehicle Stock', 'Stock de vehiculos'],
          ['Manage and monitor dealership inventory.', 'Gestiona y monitorea el inventario de la automotora.'],
          ['Add New Stock', 'Agregar vehiculo'],
          ['Add Vehicle', 'Agregar vehiculo'],
          ['All Brands', 'Todas las marcas'],
          ['All Ucarianos', 'Todos los ucarianos'],
          ['Search stock, VIN...', 'Buscar stock o VIN...'],
          ['Search...', 'Buscar...'],
          ["Today's Agenda", 'Agenda de hoy'],
          ['Ucarianos Directory', 'Directorio de ucarianos'],
          ['Review and manage communications sent to Ucarianos.', 'Revisa y administra las comunicaciones enviadas a los ucarianos.'],
          ['Load More Notifications', 'Cargar mas notificaciones']
        ];

        function replaceText(value) {
          if (!value) return value;

          var output = value;
          dictionary.forEach(function (pair) {
            output = output.split(pair[0]).join(pair[1]);
          });

          return output;
        }

        var textNodes = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT);
        while (textNodes.nextNode()) {
          var node = textNodes.currentNode;
          var original = node.nodeValue || '';
          var replaced = replaceText(original);
          if (replaced !== original) {
            node.nodeValue = replaced;
          }
        }

        doc.querySelectorAll('input, textarea').forEach(function (input) {
          if (input.placeholder) {
            input.placeholder = replaceText(input.placeholder);
          }
        });

        doc.querySelectorAll('option').forEach(function (option) {
          option.textContent = replaceText(option.textContent || '');
        });
      }

      function getScreenFromHash() {
        var hash = window.location.hash.replace('#', '').trim();
        return validScreens.indexOf(hash) >= 0 ? hash : defaultScreen;
      }

      function setActive(screen, writeHash) {
        var current = validScreens.indexOf(screen) >= 0 ? screen : defaultScreen;

        document.querySelectorAll('.screen').forEach(function (panel) {
          panel.classList.toggle('is-active', panel.getAttribute('data-screen') === current);
        });

        document.querySelectorAll('.nav-link').forEach(function (link) {
          var active = link.getAttribute('data-screen') === current;
          link.classList.toggle('is-active', active);
          if (active) {
            link.setAttribute('aria-current', 'page');
          } else {
            link.removeAttribute('aria-current');
          }
        });

        if (writeHash) {
          history.replaceState(null, '', '#' + current);
        }
      }

      document.querySelectorAll('.screen iframe').forEach(function (frame) {
        frame.addEventListener('load', function () {
          normalizeIframe(frame);
          try {
            if (frame.contentWindow) {
              attachScrollSource(frame.contentWindow);
            }
          } catch (_) {
            // Ignore cross-window access errors and continue.
          }
        });

        if (frame.contentDocument && frame.contentDocument.readyState === 'complete') {
          normalizeIframe(frame);
          try {
            if (frame.contentWindow) {
              attachScrollSource(frame.contentWindow);
            }
          } catch (_) {
            // Ignore cross-window access errors and continue.
          }
        }
      });

      document.querySelectorAll('.nav-link').forEach(function (link) {
        link.addEventListener('click', function (event) {
          event.preventDefault();
          var screen = link.getAttribute('data-screen') || defaultScreen;
          setActive(screen, true);
        });
      });

      window.addEventListener('hashchange', function () {
        setActive(getScreenFromHash(), false);
      });

      window.addEventListener('scroll', onScroll, { passive: true });

      syncTopbarVisibility();

      setActive(getScreenFromHash(), true);
    })();
  </script>
</body>
</html>
